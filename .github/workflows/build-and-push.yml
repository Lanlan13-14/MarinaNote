name: Build Docker Image to Personal GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  packages: write

env:
  FORCEJAVASCRIPTACTIONSTONODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set image names
        run: |
          OWNERLOWER=$(echo "${{ github.repositoryowner }}" | tr '[:upper:]' '[:lower:]')
          VERSION_TAG=${{ github.event.inputs.tag }}
          echo "VERSIONTAG=${VERSIONTAG}" >> $GITHUB_ENV
          echo "IMAGETAG=ghcr.io/${OWNERLOWER}/marinanote:${VERSIONTAG}" >> $GITHUBENV
          echo "IMAGELATEST=ghcr.io/${OWNERLOWER}/marinanote:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGETAG -t $IMAGELATEST .

      - name: Push Docker image
        run: |
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Generate changelog
        run: |
          git fetch --tags

          CURRENTTAG=${{ env.VERSIONTAG }}

          PREVTAG=$(git tag --sort=-creatordate | grep -v "^${CURRENTTAG}$" | head -n 1)

          echo "CHANGELOG<<EOF" >> $GITHUB_ENV

          if [ -z "$PREV_TAG" ]; then
            echo "## 🚀 初始版本" >> $GITHUB_ENV
            git log --pretty=format:"- %s (%h)" >> $GITHUB_ENV
          else
            echo "## 🚀 更新内容 ($PREVTAG → $CURRENTTAG)" >> $GITHUB_ENV
            git log ${PREVTAG}..HEAD --pretty=format:"- %s (%h)" >> $GITHUBENV
          fi

          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tagname: ${{ env.VERSIONTAG }}
          name: Release ${{ env.VERSION_TAG }}
          body: ${{ env.CHANGELOG }}